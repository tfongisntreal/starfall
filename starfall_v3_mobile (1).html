<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
#wrap{background:#0d0a1e;border-radius:16px;overflow:hidden;position:relative;width:100%;max-width:600px;margin:0 auto;font-family:'Nunito',sans-serif;touch-action:none;}
#c{display:block;width:100%;height:auto;}
#ui{position:absolute;top:10px;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 14px;pointer-events:none;}
#score-box{background:rgba(255,255,255,0.12);border-radius:20px;padding:3px 12px;color:#fde8f0;font-size:14px;font-weight:700;}
#lives-box{display:flex;gap:4px;}
.heart{font-size:16px;}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(13,10,30,0.9);text-align:center;padding:1.5rem 2rem;gap:0;}
#overlay.hidden{display:none;}
#overlay h2{color:#f9c8e0;font-size:clamp(18px,5vw,26px);font-weight:800;margin-bottom:10px;}
.win-script{font-family:'Dancing Script',cursive;font-size:clamp(20px,5.5vw,30px);color:#ffb3d9;line-height:1.45;margin-bottom:12px;text-shadow:0 0 20px rgba(255,150,200,0.4);}
#overlay .sub{color:#d4a8c8;font-size:clamp(13px,3.5vw,15px);line-height:1.65;max-width:320px;margin-bottom:20px;}
.obtn{background:linear-gradient(135deg,#c026d3,#7c3aed);color:#fff;border:none;border-radius:50px;padding:11px 28px;font-family:'Nunito',sans-serif;font-size:clamp(14px,4vw,16px);font-weight:700;cursor:pointer;letter-spacing:0.03em;}
#ctrl{display:flex;justify-content:center;gap:10px;padding:10px 0 6px;}
.cbtn{background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.22);border-radius:14px;color:#f0d6ff;font-size:20px;width:64px;height:52px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:800;-webkit-tap-highlight-color:transparent;transition:background 0.1s;user-select:none;}
.cbtn:active,.cbtn.pressed{background:rgba(255,255,255,0.28);}
#hint{text-align:center;font-size:11px;color:rgba(200,180,220,0.5);padding-bottom:6px;}
</style>

<div id="wrap">
  <canvas id="c"></canvas>
  <div id="ui">
    <div id="score-box">⭐ <span id="sc">0</span></div>
    <div id="lives-box">
      <span class="heart" id="h1">♥</span>
      <span class="heart" id="h2">♥</span>
      <span class="heart" id="h3">♥</span>
    </div>
  </div>
  <div id="overlay">
    <h2>✦ Starfall ✦</h2>
    <p class="sub">Hương lớn giúp Hương nhỏ nhảy qua các đám mây,<br>thu thập ngôi sao và chạm đến Mặt Trăng nhé =)))</p>
    <button class="obtn" onclick="startGame()">Bắt đầu ✨</button>
  </div>
</div>
<div id="ctrl">
  <button class="cbtn" id="bl">◀</button>
  <button class="cbtn" id="bj">↑</button>
  <button class="cbtn" id="br">▶</button>
</div>
<div id="hint">← → di chuyển &nbsp;|&nbsp; ↑ / Space nhảy</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const LOGICAL_W = 600, LOGICAL_H = 380;
canvas.width = LOGICAL_W; canvas.height = LOGICAL_H;

const WIN_LINE1 = "Chúc mừng Hương đã bắt được hết sao rồi nhé =)))";
const WIN_LINE2 = "🌙";

let state='idle', keys={}, score=0, lives=3, camX=0;
let stars_collected=0, t=0, frameId, particles=[];
const TOTAL_STARS=8, WORLD_W=3200, GROUND_Y=340;
let player, platforms, stars_obj, thorns, moonGoal;

function initGame(){
  score=0; lives=3; camX=0; stars_collected=0; particles=[];
  updateHUD();
  player={x:80,y:280,vx:0,vy:0,w:28,h:34,onGround:false,dir:1,frame:0,frameTimer:0,invincible:0,trail:[]};
  platforms=[
    {x:0,y:GROUND_Y,w:520,h:40,type:'g'},{x:580,y:GROUND_Y,w:200,h:40,type:'g'},
    {x:820,y:GROUND_Y,w:300,h:40,type:'g'},{x:1180,y:GROUND_Y,w:350,h:40,type:'g'},
    {x:1600,y:GROUND_Y,w:400,h:40,type:'g'},{x:2060,y:GROUND_Y,w:300,h:40,type:'g'},
    {x:2430,y:GROUND_Y,w:500,h:40,type:'g'},{x:2980,y:GROUND_Y,w:WORLD_W-2980,h:40,type:'g'},
    {x:200,y:260,w:90,h:16,type:'c'},{x:370,y:220,w:80,h:16,type:'c'},
    {x:480,y:180,w:70,h:16,type:'c'},{x:620,y:240,w:85,h:16,type:'c'},
    {x:750,y:195,w:80,h:16,type:'c'},{x:880,y:250,w:90,h:16,type:'c'},
    {x:1010,y:200,w:80,h:16,type:'c'},{x:1100,y:155,w:75,h:16,type:'c'},
    {x:1240,y:220,w:85,h:16,type:'c'},{x:1360,y:170,w:80,h:16,type:'c'},
    {x:1460,y:130,w:90,h:16,type:'c'},{x:1620,y:250,w:80,h:16,type:'c'},
    {x:1750,y:195,w:85,h:16,type:'c'},{x:1860,y:145,w:80,h:16,type:'c'},
    {x:1980,y:100,w:75,h:16,type:'c'},{x:2100,y:240,w:90,h:16,type:'c'},
    {x:2240,y:185,w:80,h:16,type:'c'},{x:2360,y:140,w:85,h:16,type:'c'},
    {x:2480,y:220,w:80,h:16,type:'c'},{x:2600,y:170,w:90,h:16,type:'c'},
    {x:2720,y:120,w:80,h:16,type:'c'},{x:2840,y:80,w:85,h:16,type:'c'},
    {x:2960,y:220,w:90,h:16,type:'c'},{x:3080,y:160,w:80,h:16,type:'c'},
  ];
  stars_obj=[
    {x:220,y:235,r:9,collected:false},{x:490,y:155,r:9,collected:false},
    {x:760,y:168,r:9,collected:false},{x:1110,y:128,r:9,collected:false},
    {x:1470,y:104,r:9,collected:false},{x:1870,y:118,r:9,collected:false},
    {x:1990,y:74,r:9,collected:false},{x:2850,y:54,r:10,collected:false},
  ];
  thorns=[
    {x:543,y:GROUND_Y-14,w:32,h:14},{x:1155,y:GROUND_Y-14,w:18,h:14},
    {x:1574,y:GROUND_Y-14,w:20,h:14},{x:2050,y:GROUND_Y-14,w:22,h:14},
    {x:2415,y:GROUND_Y-14,w:18,h:14},{x:2950,y:GROUND_Y-14,w:28,h:14},
  ];
  moonGoal={x:WORLD_W-200,y:180,r:36};
}

function updateHUD(){
  document.getElementById('sc').textContent=score;
  ['h1','h2','h3'].forEach((id,i)=>{
    const el=document.getElementById(id);
    el.textContent=i<lives?'♥':'♡';
    el.style.color=i<lives?'#ff6fa3':'rgba(255,255,255,0.2)';
  });
}

function startGame(){
  document.getElementById('overlay').classList.add('hidden');
  initGame(); state='playing';
  if(frameId) cancelAnimationFrame(frameId);
  loop();
}

const bgStars=Array.from({length:80},()=>({
  x:Math.random()*WORLD_W, y:Math.random()*300,
  r:Math.random()*1.4+0.3, twinkle:Math.random()*Math.PI*2,
  speed:0.02+Math.random()*0.04
}));

function loop(){
  if(state!=='playing') return;
  update(); draw();
  frameId=requestAnimationFrame(loop);
}

function update(){
  t+=0.016;
  if(player.invincible>0) player.invincible--;
  const onL=keys['ArrowLeft']||keys['left'];
  const onR=keys['ArrowRight']||keys['right'];
  const jump=keys['ArrowUp']||keys['Space']||keys['jump'];
  if(onL){player.vx=-3.2;player.dir=-1;}
  else if(onR){player.vx=3.2;player.dir=1;}
  else player.vx*=0.6;
  if(jump&&player.onGround){player.vy=-10.5;player.onGround=false;spawnP(player.x+14,player.y+34,'#c084fc',6);}
  player.vy+=0.45; if(player.vy>14)player.vy=14;
  player.x+=player.vx; player.y+=player.vy;
  player.onGround=false;
  for(const p of platforms){
    if(player.x+player.w>p.x&&player.x<p.x+p.w&&player.y+player.h>p.y&&player.y+player.h<p.y+p.h+14&&player.vy>=0){
      player.y=p.y-player.h; player.vy=0; player.onGround=true;
    }
  }
  if(player.x<0)player.x=0;
  if(player.x+player.w>WORLD_W)player.x=WORLD_W-player.w;
  if(player.y>H+80){loseLife();return;}
  for(const th of thorns){
    if(player.invincible===0&&player.x+player.w-4>th.x&&player.x+4<th.x+th.w&&player.y+player.h>th.y&&player.y<th.y+th.h){loseLife();return;}
  }
  for(const s of stars_obj){
    if(!s.collected){
      const dx=player.x+14-s.x,dy=player.y+17-s.y;
      if(dx*dx+dy*dy<(s.r+16)**2){
        s.collected=true; score+=10; stars_collected++;
        spawnP(s.x,s.y,'#fde047',12); updateHUD();
      }
    }
  }
  const mdx=player.x+14-moonGoal.x,mdy=player.y+17-moonGoal.y;
  if(mdx*mdx+mdy*mdy<(moonGoal.r+16)**2&&stars_collected>=TOTAL_STARS){winGame();return;}
  camX=player.x-W/3; if(camX<0)camX=0; if(camX>WORLD_W-W)camX=WORLD_W-W;
  player.trail.unshift({x:player.x+14,y:player.y+17});
  if(player.trail.length>8)player.trail.pop();
  player.frameTimer++; if(player.frameTimer>8){player.frame=(player.frame+1)%4;player.frameTimer=0;}
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
  bgStars.forEach(s=>s.twinkle+=s.speed);
}

const W=LOGICAL_W, H=LOGICAL_H;

function loseLife(){
  lives--; updateHUD();
  spawnP(player.x+14,player.y+17,'#ff6b9d',14);
  if(lives<=0){gameOver();}
  else{player.invincible=80;player.x=80;player.y=280;player.vx=0;player.vy=0;camX=0;}
}

function spawnP(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=1.5+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,color,life:28+Math.floor(Math.random()*14),r:2+Math.random()*3});
  }
}

function gameOver(){
  state='idle'; cancelAnimationFrame(frameId);
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<h2>Ôi không! 💔</h2><p class="sub">Cô bé ngã rồi...<br>Thử lại nhé, lần này chắc được thôi!</p><button class="obtn" onclick="startGame()">Thử lại 🌸</button>`;
  ov.classList.remove('hidden');
}

function winGame(){
  state='idle'; cancelAnimationFrame(frameId);
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<h2>🌙 Đến Mặt Trăng rồi! 🌙</h2><div class="win-script">${WIN_LINE1}</div><p class="sub">${WIN_LINE2.replace('\n','<br>')}</p><button class="obtn" onclick="startGame()">Chơi lại ✨</button>`;
  ov.classList.remove('hidden');
}

function drawBg(){
  ctx.fillStyle='#0d0a1e'; ctx.fillRect(0,0,W,H);
  bgStars.forEach(s=>{
    const sx=s.x-camX*0.3;
    if(sx<-10||sx>W+10)return;
    ctx.globalAlpha=0.4+0.6*Math.abs(Math.sin(s.twinkle));
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(sx,s.y,s.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawPlatforms(){
  for(const p of platforms){
    const sx=p.x-camX;
    if(sx+p.w<0||sx>W)continue;
    if(p.type==='g'){
      ctx.fillStyle='#1e1040';ctx.fillRect(sx,p.y,p.w,p.h);
      ctx.fillStyle='#6b21a8';ctx.fillRect(sx,p.y,p.w,4);
    } else {
      ctx.fillStyle='rgba(196,181,253,0.18)';
      ctx.beginPath();ctx.roundRect(sx,p.y,p.w,p.h,8);ctx.fill();
      ctx.strokeStyle='rgba(216,180,254,0.55)';ctx.lineWidth=1.5;ctx.stroke();
    }
  }
}

function drawThorns(){
  for(const th of thorns){
    const sx=th.x-camX;
    if(sx+th.w<0||sx>W)continue;
    ctx.fillStyle='#e11d48';
    const n=Math.floor(th.w/8);
    for(let i=0;i<n;i++){
      ctx.beginPath();ctx.moveTo(sx+i*8,th.y+th.h);ctx.lineTo(sx+i*8+4,th.y);ctx.lineTo(sx+i*8+8,th.y+th.h);ctx.closePath();ctx.fill();
    }
  }
}

function drawStar5(cx,cy,ro,ri){
  ctx.beginPath();
  for(let i=0;i<10;i++){const a=(i*Math.PI/5)-Math.PI/2,r=i%2===0?ro:ri;ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));}
  ctx.closePath();ctx.fill();
}

function drawStars(){
  for(const s of stars_obj){
    if(s.collected)continue;
    const sx=s.x-camX;
    if(sx<-20||sx>W+20)continue;
    const bob=Math.sin(t*2.5+s.x)*3;
    ctx.fillStyle='#fde047';
    ctx.shadowColor='#fbbf24';ctx.shadowBlur=10;
    drawStar5(sx,s.y+bob,s.r,s.r*0.45);
    ctx.shadowBlur=0;
  }
}

function drawMoon(){
  const sx=moonGoal.x-camX;
  if(sx<-80||sx>W+80)return;
  ctx.fillStyle='rgba(253,230,138,0.15)';
  ctx.beginPath();ctx.arc(sx,moonGoal.y,moonGoal.r+20,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fef3c7';
  ctx.beginPath();ctx.arc(sx,moonGoal.y,moonGoal.r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(253,230,138,0.5)';
  ctx.beginPath();ctx.arc(sx-8,moonGoal.y-8,8,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(sx+10,moonGoal.y+5,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(253,230,138,0.8)';
  ctx.font='bold 12px Nunito,sans-serif';ctx.textAlign='center';
  if(stars_collected<TOTAL_STARS)ctx.fillText(`${stars_collected}/${TOTAL_STARS} ⭐`,sx,moonGoal.y+moonGoal.r+16);
  else ctx.fillText('Nhảy lên đây!',sx,moonGoal.y+moonGoal.r+16);
}

function drawPlayer(){
  if(player.invincible>0&&Math.floor(player.invincible/5)%2===0)return;
  player.trail.forEach((pt,i)=>{
    const sx=pt.x-camX;
    ctx.globalAlpha=(1-i/player.trail.length)*0.18;
    ctx.fillStyle='#c084fc';
    ctx.beginPath();ctx.arc(sx,pt.y,8,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
  const sx=player.x-camX,px=sx+14,py=player.y+17;
  ctx.fillStyle='#f9a8d4';
  ctx.beginPath();ctx.ellipse(px,player.y+19,13,18,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fce7f3';
  ctx.beginPath();ctx.ellipse(px,player.y+10,11,10,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1e1b4b';
  ctx.beginPath();ctx.arc(px+player.dir*4,player.y+8,3.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(px+player.dir*4+1,player.y+7,1.3,0,Math.PI*2);ctx.fill();
  const legBob=player.onGround?Math.sin(t*10)*4:0;
  ctx.strokeStyle='#fbcfe8';ctx.lineWidth=2;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(px-5,player.y+27);ctx.lineTo(px-7,player.y+34+legBob);ctx.stroke();
  ctx.beginPath();ctx.moveTo(px+5,player.y+27);ctx.lineTo(px+7,player.y+34-legBob);ctx.stroke();
  ctx.strokeStyle='#f9a8d4';ctx.lineWidth=2;
  const armS=Math.sin(t*8)*10;
  ctx.beginPath();ctx.moveTo(px-12,player.y+15);ctx.lineTo(px-15,player.y+21+armS*0.3);ctx.stroke();
  ctx.beginPath();ctx.moveTo(px+12,player.y+15);ctx.lineTo(px+15,player.y+21-armS*0.3);ctx.stroke();
  ['#c026d3','#7c3aed','#6d28d9'].forEach((c,i)=>{
    ctx.fillStyle=c;
    ctx.beginPath();ctx.ellipse(px-8+i*8,player.y,6,9,(i-1)*0.3,0,Math.PI*2);ctx.fill();
  });
}

function drawParticles(){
  for(const p of particles){
    const sx=p.x-camX;
    ctx.globalAlpha=p.life/42;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(sx,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

function draw(){
  ctx.clearRect(0,0,W,H);
  drawBg();drawPlatforms();drawThorns();drawStars();drawMoon();drawParticles();drawPlayer();
}

document.addEventListener('keydown',e=>{keys[e.code]=true;if(['ArrowUp','ArrowDown','Space'].includes(e.code))e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

function setupBtn(id,key){
  const el=document.getElementById(id);
  el.addEventListener('pointerdown',e=>{e.preventDefault();keys[key]=true;el.classList.add('pressed');});
  el.addEventListener('pointerup',e=>{e.preventDefault();keys[key]=false;el.classList.remove('pressed');});
  el.addEventListener('pointerleave',e=>{keys[key]=false;el.classList.remove('pressed');});
  el.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
}
setupBtn('bl','left');setupBtn('br','right');setupBtn('bj','jump');

draw();
</script>
